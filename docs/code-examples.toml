# Shared code examples configuration

[hello-world]
code = '''
fun main: () = {
    "Hello, World!" |> println
}
'''
language = "restrict"

[osv-basic]
code = '''
// Data flows naturally from left to right
fun greet: (name: String) -> String = {
    "Hello, " + name
}

fun announce: (message: String) -> () = {
    message |> println
}

fun main: () = {
    "Restrict" |> greet |> announce
}
'''
language = "restrict"

[affine-example]
code = '''
// Affine types prevent use-after-move
fun consume_message: (message: String) -> () = {
    message |> println
}

fun main: () = {
    val message = "Hello"
    message |> consume_message  // OK: first use
    // message |> consume_message  // ERROR: already consumed
}
'''
language = "restrict"

[pattern-matching]
code = '''
fun describe: (value: Option<Int32>) -> String = {
    value match {
        Some(number) => { "has value" }
        None => { "missing" }
    }
}
'''
language = "restrict"

[warder-init]
code = '''
# Create a new project
warder new my-awesome-app
cd my-awesome-app

# Add dependencies
warder add http
warder add json@1.0.0

# Build and run
warder build
warder run
'''
language = "bash"

[generic-function]
code = '''
// Generic functions use Restrict type parameters
fun identity: <T>(value: T) -> T = {
    value
}

fun main: () = {
    val answer = 42 |> identity
    answer |> print_int
}
'''
language = "restrict"

[with-block]
code = '''
// Context values are introduced with current with-block syntax
context RequestLog {
    prefix: String
}

fun main: () = {
    val label = "request"
    with RequestLog { prefix: label } {
        "ready" |> println
    }
}
'''
language = "restrict"
