name: Deploy Documentation

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  MDBOOK_VERSION: '0.5.3'
  WASM_PACK_VERSION: '0.15.0'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: ${{ env.MDBOOK_VERSION }}

      # wasm-pack moved from rustwasm/ to wasm-bindgen/, which 404s the
      # abandoned jetli action. taiki-e/install-action tracks the new source
      # and installs a prebuilt binary.
      - name: Setup wasm-pack
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack@${{ env.WASM_PACK_VERSION }}

      - name: Print documentation tool versions
        run: |
          mdbook --version
          wasm-pack --version

      - name: Build documentation
        run: mdbook build docs

      - name: Build online compiler
        run: wasm-pack build --target web --out-dir web/pkg

      - name: Assemble Pages site
        run: bash scripts/build-pages.sh

      - name: Validate Pages artifact
        run: |
          test -f site/dist/index.html
          test -f site/dist/favicon.svg
          test -f site/dist/404.html
          test -f site/dist/robots.txt
          test -f site/dist/sitemap.xml
          test -f site/dist/docs/index.html
          test -f site/dist/blog/index.html
          test -f site/dist/compiler/index.html
          test -f site/dist/compiler/app.js
          test -f site/dist/compiler/restrict-highlight.js
          test -f site/dist/compiler/pkg/restrict_lang.js
          find site/dist/compiler/pkg -maxdepth 1 -type f -name '*.wasm' -print -quit | grep -q .
          test -f site/dist/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./site/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
