name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Cancel superseded runs for the same ref so rapid pushes / PR updates
# (e.g. Dependabot bursts) do not pile up redundant runner-minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Cache cargo
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: |
          .
          warder

    - name: Check formatting
      run: cargo fmt -- --check

    - name: Lint
      run: cargo clippy -- -D warnings

    - name: Run tests
      run: cargo test --verbose

    - name: Test Warder
      run: cd warder && cargo test --verbose

    - name: Install mise
      uses: jdx/mise-action@v2

    - name: Check release example entrypoints compile
      run: mise run check

    # Release build is a smoke test only: real release artifacts come from
    # release.yml on tags. Run it on main pushes to catch breakage before a
    # tag, but skip it on PRs to roughly halve their compile time.
    - name: Build release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: cargo build --release

    - name: Build Warder release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: cd warder && cargo build --release
